<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0e17">
  <meta name="description" content="NeoBank - Ngân hàng số thế hệ mới. Chuyển tiền, thanh toán QR, quản lý thẻ và nhiều hơn nữa.">
  <title>NeoBank — Ngân hàng số thế hệ mới</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏦</text></svg>">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0db9f2",
            "background-light": "#f5f8f8",
            "background-dark": "#101e22",
            "success-green": "#22c55e",
            "card-dark": "#182d34",
            "border-dark": "#315a68",
          },
          fontFamily: {
            "display": ["Inter"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="src/styles/index.css">
</head>
<body class="dark animate-fade-in">
  
  <!-- Device Selector (Desktop Only) -->
  <div class="fixed top-6 left-6 z-[3000] hidden lg:flex flex-col gap-3 bg-card/80 backdrop-blur-xl border border-white/10 p-4 rounded-2xl shadow-2xl">
    <h3 class="text-xs font-bold uppercase tracking-widest opacity-50 mb-1">Simulate Device</h3>
    <button onclick="document.body.className='dark animate-fade-in'" class="text-left text-sm font-semibold hover:text-primary transition-colors">iPhone 15 Pro (Default)</button>
    <button onclick="document.body.className='dark device-iphone-15-pm animate-fade-in'" class="text-left text-sm font-semibold hover:text-primary transition-colors">iPhone 15 Pro Max</button>
    <button onclick="document.body.className='dark device-iphone-13-mini animate-fade-in'" class="text-left text-sm font-semibold hover:text-primary transition-colors">iPhone 13 Mini</button>
    <button onclick="document.body.className='dark device-iphone-8-plus animate-fade-in'" class="text-left text-sm font-semibold hover:text-primary transition-colors">iPhone 8 Plus</button>
  </div>

  <!-- Simulated Status Bar -->
  <div id="status-bar" class="status-bar">
    <div class="time" id="status-time">09:41</div>
    <div class="icons">
      <span class="material-symbols-outlined text-[14px]">signal_cellular_alt</span>
      <span class="material-symbols-outlined text-[14px]">wifi</span>
      <span class="material-symbols-outlined text-[14px]">battery_very_low</span>
    </div>
  </div>

  <div id="app"></div>
  
  <script>
    // Update simulated time
    function updateSimulatedTime() {
      const now = new Date();
      const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
      const timeEl = document.getElementById('status-time');
      if (timeEl) timeEl.textContent = timeStr;
    }
    setInterval(updateSimulatedTime, 1000);
    updateSimulatedTime();
  </script>

  <script type="module" src="src/main.js"></script>
</body>
</html>
